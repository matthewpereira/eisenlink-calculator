<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eisenlink Weight Calculator</title>
<link rel="stylesheet" href="css/styles.css">
<script src="js/app.js" defer></script>
</head>
<body>

<main class="app">

  <section class="readout">
    <span class="readout-number" id="heroWeight">45</span>
    <span class="readout-unit">lb</span>
  </section>

  <section class="stage">
    <div class="dumbbell-viz" id="sliderViz"></div>
  </section>

  <section class="breakdown" id="sliderBreakdown"></section>

  <!-- Hidden during user testing of the touch-drag gesture. Remove "is-hidden"
       to bring the slider back. The input stays in the DOM and still drives the
       weight (the drag writes to it), so nothing else needs to change. -->
  <footer class="controls is-hidden">
    <input type="range" id="weightSlider" min="0" max="28" step="1" value="8" aria-label="Dumbbell weight">
    <div class="slider-labels"><span>10 lb</span><span>45 lb</span><span>80 lb</span></div>
  </footer>

</main>

</body>
</html>
